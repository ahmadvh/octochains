name: Publish Octochains

on:
  push:
    branches: [ "main" ]     # Triggers TestPyPI upload on main branch pushes
    tags: [ "v*" ]           # Triggers Real PyPI upload when pushing tags (e.g., v0.2.0)

jobs:
  build-and-publish:
    name: Build and publish Python distribution
    runs-on: ubuntu-latest
    
    # These permissions are MANDATORY for Trusted Publishing
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build package
        run: python -m build

      # STEP A: Upload to TestPyPI on normal commits
      - name: Publish to TestPyPI
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true  # Prevents crashing if you don't bump the version on every single commit

      # STEP B: Upload to the Real PyPI ONLY when a Git Tag is pushed
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1