name: Publish Octochains

on:
  push:
    branches: [ "main" ]     # Triggers TestPyPI upload on main branch pushes
    tags: [ "v*" ]           # Triggers Real PyPI & GitHub Release when pushing tags

jobs:
  build-and-publish:
    name: Build, Publish, and Release
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: write        # CHANGED: Must be 'write' to create a GitHub Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build package
        run: python -m build

      # STEP A: Upload to TestPyPI on normal commits
      - name: Publish to TestPyPI
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      # STEP B: Upload to the Real PyPI ONLY when a Git Tag is pushed
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1

      # STEP C: Create the Official GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true 